name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ==================== 后端构建 + 测试 ====================
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run Tests
        # 只跑单元测试（不含 scratch-app 集成测试，后者需要完整 MySQL/Redis 环境）
        run: mvn test -B -pl scratch-common-core,scratch-common-redis,scratch-common-security,scratch-common-audit,scratch-user,scratch-editor,scratch-judge,scratch-social,scratch-classroom,scratch-system,scratch-sb3

      - name: Package (skip tests)
        run: mvn package -DskipTests -B

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/scratch-app/target/*.jar
          retention-days: 7

      - name: Dependency vulnerability scan
        run: mvn dependency:check -B -DfailBuild=false || true

  # ==================== 前端构建 + 测试 ====================
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TurboWarp (self-hosted editor)
        run: |
          cd ..
          bash scripts/build-turbowarp.sh

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-vue/dist/
          retention-days: 7

      - name: Security audit
        run: npm audit --production --audit-level=high || true

  # ==================== Sandbox 构建 + 测试 ====================
  sandbox:
    name: Sandbox Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run tests (if any)
        run: npm test --if-present

      - name: Security audit
        run: npm audit --production --audit-level=high || true

  # ==================== Docker 构建验证 ====================
  docker:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [backend, sandbox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t scratch-backend:test backend/

      - name: Build sandbox image
        run: docker build -f sandbox/Dockerfile -t scratch-sandbox:test sandbox/

      - name: Verify images
        run: |
          docker images | grep scratch-backend
          docker images | grep scratch-sandbox

  # ==================== 代码质量检查 ====================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check -B -pl scratch-common-core,scratch-common-redis,scratch-common-security,scratch-common-audit || true

      - name: Verify compilation (all modules)
        run: mvn compile -B -T 4

  # ==================== 自动部署（仅 main 分支） ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend, sandbox, docker, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Push Docker Images
        run: |
          echo "CD pipeline ready. Configure deployment target (VPS/cloud) to enable auto-deploy."
          echo "Current artifacts:"
          echo "  - Backend JAR: backend/scratch-app/target/*.jar"
          echo "  - Frontend dist: frontend-vue/dist/"
          echo "  - Sandbox: sandbox/"
