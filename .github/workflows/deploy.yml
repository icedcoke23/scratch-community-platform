name: CD - Production Deploy

on:
  # 手动触发部署
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      version:
        description: '版本标签 (留空则使用 commit SHA)'
        required: false
        type: string

  # CI 通过后自动触发（仅 main 分支）
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/scratch-community

jobs:
  # ==================== 版本号生成 ====================
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      version: ${{ steps.version.outputs.version }}
      environment: ${{ steps.version.outputs.environment }}

    steps:
      - name: Generate version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
            VER="${{ github.event.inputs.version }}"
          else
            ENV="production"
            VER=""
          fi

          if [ -z "$VER" ]; then
            VER="$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VER"
          echo "🌍 Environment: $ENV"

  # ==================== 后端构建 + 推送镜像 ====================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: cd backend && mvn package -DskipTests -B -T 4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 前端构建 + 推送镜像 ====================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend-vue
          npm ci

      - name: Build Scratch editor (scratch-gui)
        run: bash scripts/build-scratch-editor.sh

      - name: Build frontend
        run: |
          cd frontend-vue
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend-vue
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== Sandbox 构建 + 推送镜像 ====================
  build-sandbox:
    name: Build Sandbox Image
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: sandbox
          file: sandbox/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== 部署到服务器 ====================
  deploy:
    name: Deploy to ${{ needs.version.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [version, build-backend, build-frontend, build-sandbox]
    environment:
      name: ${{ needs.version.outputs.environment }}
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - name: Checkout (获取部署脚本)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            echo "🚀 开始部署 Scratch Community Platform v${{ needs.version.outputs.version }}"
            echo "📅 部署时间: $(date)"

            # 项目目录
            PROJECT_DIR="/opt/scratch-community"
            cd "$PROJECT_DIR"

            # 拉取最新代码（获取 docker-compose 配置更新）
            git fetch origin main
            git checkout main
            git pull origin main

            # 登录容器镜像仓库
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 拉取新镜像
            echo "📦 拉取镜像..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.version.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:${{ needs.version.outputs.version }}

            # 更新镜像标签
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.version.outputs.version }}"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.version.outputs.version }}"
            export SANDBOX_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:${{ needs.version.outputs.version }}"

            # 备份当前版本号
            PREV_VERSION=$(cat .deployed-version 2>/dev/null || echo "unknown")
            echo "$PREV_VERSION" > .rollback-version
            echo "📌 当前版本: $PREV_VERSION → ${{ needs.version.outputs.version }}"

            # 数据库备份（部署前自动备份）
            echo "💾 数据库备份..."
            docker exec scratch-mysql mysqldump -u root -p"${MYSQL_ROOT_PASSWORD}" scratch_community | gzip > "/opt/backups/db/pre-deploy-$(date +%Y%m%d%H%M%S).sql.gz" || true

            # 滚动更新服务
            echo "🔄 滚动更新..."
            cd docker
            docker-compose -f docker/compose/docker-compose.prod.yml up -d --no-deps --force-recreate backend
            sleep 10
            docker-compose -f docker/compose/docker-compose.prod.yml up -d --no-deps --force-recreate frontend
            sleep 5
            docker-compose -f docker/compose/docker-compose.prod.yml up -d --no-deps --force-recreate sandbox

            # 健康检查
            echo "🏥 健康检查..."
            MAX_RETRIES=30
            RETRY=0
            while [ $RETRY -lt $MAX_RETRIES ]; do
              if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
                echo "✅ 后端服务健康"
                break
              fi
              RETRY=$((RETRY + 1))
              echo "⏳ 等待后端启动... ($RETRY/$MAX_RETRIES)"
              sleep 5
            done

            if [ $RETRY -eq $MAX_RETRIES ]; then
              echo "❌ 后端健康检查失败，执行回滚..."
              docker-compose -f docker/compose/docker-compose.prod.yml up -d --no-deps --force-recreate backend
              exit 1
            fi

            # 记录部署版本
            echo "${{ needs.version.outputs.version }}" > "$PROJECT_DIR/.deployed-version"

            # 清理旧镜像
            echo "🧹 清理旧镜像..."
            docker image prune -f

            echo "✅ 部署完成 v${{ needs.version.outputs.version }}"
            echo "📊 服务状态:"
            docker-compose -f docker/compose/docker-compose.prod.yml ps

      - name: Deployment notification
        if: success()
        run: |
          echo "✅ 部署成功"
          echo "版本: ${{ needs.version.outputs.version }}"
          echo "环境: ${{ needs.version.outputs.environment }}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "⚠️ 部署失败，执行回滚..."
            cd /opt/scratch-community/docker

            # 回滚到上一个版本
            PREV_VERSION=$(cat ../.rollback-version 2>/dev/null || echo "")
            if [ -n "$PREV_VERSION" ]; then
              echo "🔙 回滚到: $PREV_VERSION"
              export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:$PREV_VERSION"
              export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:$PREV_VERSION"
              export SANDBOX_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:$PREV_VERSION"
              docker-compose -f docker/compose/docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend sandbox
              echo "✅ 回滚完成"
            else
              echo "❌ 无法回滚：未找到上一版本"
            fi

  # ==================== 部署后验证 ====================
  verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [version, deploy]

    steps:
      - name: Health check
        run: |
          echo "🏥 验证生产环境健康状态..."
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.DEPLOY_URL }}/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ 健康检查通过"
              break
            fi
            echo "⏳ 尝试 $i/10... (HTTP $STATUS)"
            sleep 10
          done

          if [ "$STATUS" != "200" ]; then
            echo "❌ 生产环境健康检查失败"
            exit 1
          fi

      - name: Smoke test
        run: |
          echo "💨 冒烟测试..."

          # 测试关键端点
          ENDPOINTS=(
            "/api/v1/health"
            "/api/v1/stats"
            "/api/v1/social/feed"
          )

          FAILED=0
          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.DEPLOY_URL }}${endpoint}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅ $endpoint → $STATUS"
            else
              echo "  ❌ $endpoint → $STATUS"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "⚠️ 部分冒烟测试失败"
            exit 1
          fi

          echo "✅ 所有冒烟测试通过"

  # ==================== 创建发布记录 ====================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version, deploy, verify]
    if: needs.version.outputs.environment == 'production'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Release v${{ needs.version.outputs.version }}
          body: |
            ## 🚀 Scratch Community Platform v${{ needs.version.outputs.version }}

            ### 部署信息
            - **环境**: ${{ needs.version.outputs.environment }}
            - **时间**: ${{ github.event.head_commit.timestamp || '手动触发' }}
            - **Commit**: `${{ github.sha }}`

            ### 镜像
            - Backend: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ needs.version.outputs.version }}`
            - Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ needs.version.outputs.version }}`
            - Sandbox: `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-sandbox:${{ needs.version.outputs.version }}`
          draft: false
          prerelease: false
