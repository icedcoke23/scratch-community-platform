upstream scratch_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name _;
    
    root /var/www/html;
    index index.html;

    location /api/ {
        proxy_pass http://scratch_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for TurboWarp sb3 download (project_url parameter)
        # TurboWarp fetches sb3 files client-side, needs CORS headers
        if ($request_uri ~* "/sb3/download") {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Cache-Control "public, max-age=300" always;
        }
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location /swagger-ui {
        proxy_pass http://scratch_backend;
        proxy_set_header Host $host;
    }

    location /actuator {
        proxy_pass http://scratch_backend;
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://scratch_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Scratch 编辑器静态文件（lib.min.js 13MB，需要缓存和 gzip）
    location /scratch-editor/ {
        alias /var/www/html/scratch-editor/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # lib.min.js 等大文件需要 gzip
        gzip on;
        gzip_types application/javascript text/css;
        gzip_min_length 10000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
