# API 集成测试配置 — 使用真实 MySQL（与开发环境相同）
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/scratch_community_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:scratch123}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# 测试环境使用独立 Redis（避免污染开发数据）
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  database: 1  # 使用 DB 1 隔离测试数据
  password: ${REDIS_PASSWORD:}

# MinIO 使用独立 bucket 前缀隔离
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ROOT_USER:scratch_admin}
  secret-key: ${MINIO_ROOT_PASSWORD:MinIO_nSIAM0iZZKY/fk0evOyDYg==}
  bucket-prefix: scratch-test-

# JWT 测试密钥（与 JwtUtils 属性名一致：scratch.jwt.secret）
scratch:
  jwt:
    secret: test-secret-key-at-least-32-bytes-long-for-integration-test!!!
    refresh-secret: test-refresh-secret-key-at-least-32bytes-long!!!
    expiration: 86400000
  ai:
    enabled: false

# 日志
logging:
  level:
    com.scratch.community: DEBUG
    org.springframework.test: INFO
    org.springframework.jdbc: DEBUG
