# 生产环境配置
# 使用方式: java -jar app.jar --spring.profiles.active=prod

# CORS 生产环境配置 - 必须设置允许的域名
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://*.scratch-community.com}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    com.scratch.community: info
    com.baomidou.mybatisplus: warn
    root: warn
  file:
    name: /var/log/scratch-community/app.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 1GB

# 生产环境安全配置
spring:
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# Actuator - 生产环境暴露健康检查和 Prometheus 指标
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 100ms,200ms,500ms,1s,5s

# Swagger - 生产环境禁用
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 生产环境 JWT 密钥必须通过环境变量设置
scratch:
  jwt:
    secret: ${JWT_SECRET}
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
