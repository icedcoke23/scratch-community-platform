# Docker Compose 生产环境配置
# 使用方式: docker-compose -f docker-compose.prod.yml --env-file ../.env up -d

services:
  mysql:
    image: mysql:8.0
    container_name: scratch-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: scratch_community
    volumes:
      - mysql_data:/var/lib/mysql
      - ../init.sql:/docker-entrypoint-initdb.../init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --performance-schema=ON
    networks:
      - scratch-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scratch-redis
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?请设置 REDIS_PASSWORD}
    networks:
      - scratch-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: scratch-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?请设置 MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?请设置 MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - scratch-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../Dockerfile.backend
    container_name: scratch-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/scratch_community?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SANDBOX_URL: http://sandbox:8081
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:https://your-domain.com}
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx1g}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - scratch-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  sandbox:
    build:
      context: ../sandbox
      dockerfile: Dockerfile
    container_name: scratch-sandbox
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PORT: "8081"
      NODE_OPTIONS: "--max-old-space-size=1024"
      MAX_CONCURRENT_JOBS: "5"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scratch-internal
    dns:
      - "127.0.0.1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend-vue
      dockerfile: ../Dockerfile.frontend
    container_name: scratch-frontend
    volumes:
      - ../nginx/nginx.conf:/et../nginx/nginx.conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - scratch-internal
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ========== 监控 ==========
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: scratch-prometheus
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheu../monitoring/prometheus.yml:ro
      - ../monitoring/alert_rules.yml:/etc/prometheu../monitoring/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheu../monitoring/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - scratch-internal
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  grafana:
    image: grafan../monitoring/grafana:10.4.0
    container_name: scratch-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/li../monitoring/grafana
      - ../monitoring/grafana/dashboards:/et../monitoring/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/datasources:/et../monitoring/grafana/provisioning/datasources:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    networks:
      - scratch-internal
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # ========== 日志聚合 ==========
  loki:
    image: grafana/loki:2.9.6
    container_name: scratch-loki
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - scratch-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.6
    container_name: scratch-promtail
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
      # 可选：挂载应用日志目录
      # - /var/log/scratch:/var/log/scratch:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - scratch-internal
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # Nginx 反向代理（前端 + 后端 + 监控）
  nginx:
    image: nginx:alpine
    container_name: scratch-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.prod.conf:/et../nginx/nginx.conf.d/default.conf:ro
      # HTTPS 证书（Let's Encrypt）
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
      - grafana
    networks:
      - scratch-internal
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

networks:
  scratch-internal:
    driver: bridge
    internal: true

volumes:
  mysql_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
