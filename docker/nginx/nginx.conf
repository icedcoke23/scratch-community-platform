# Nginx 配置 - Scratch Community Platform
# 用于生产环境反向代理

upstream backend {
    server backend:8080;
    keepalive 32;
}

upstream sandbox {
    server sandbox:8081;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # SSE (Server-Sent Events) - 需要特殊配置
    location /api/v1/ai-review/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 必须禁用缓冲
        proxy_buffering off;
        proxy_cache off;

        # 长连接超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Swagger UI (仅开发环境启用)
    location /swagger-ui/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    location /v3/api-docs/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend/api/health;
        proxy_set_header Host $host;
    }

    # Actuator 监控端点 (仅内部访问)
    location /actuator/ {
        # 仅允许内网访问
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # 沙箱健康检查
    location /sandbox/health {
        proxy_pass http://sandbox/health;
        proxy_set_header Host $host;
    }

    # SB3 文件下载（CORS 友好，供 TurboWarp 等外部编辑器加载）
    # Nginx 直接添加 CORS 头，不依赖后端 CORS 配置
    # 使用精确匹配优先于 /api/ 通用代理
    location = /api/v1/project/sb3-download-cors {
        # 此 location 仅用于 Nginx 配置语法验证
        # 实际匹配由下方正则 location 处理
        return 404;
    }

    location ~ ^/api/v1/project/(\d+)/sb3/download$ {
        proxy_pass http://backend/api/v1/project/$1/sb3/download;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";

        # CORS 头 — Nginx 层直接处理，后端 CORS 过滤器不再干扰
        # 使用 always 确保即使后端返回错误码也带 CORS 头
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Expose-Headers "Content-Disposition, Content-Length" always;
        add_header Access-Control-Max-Age "3600" always;
        add_header Cache-Control "public, max-age=300" always;

        # 处理 OPTIONS 预检请求（直接返回，不转发到后端）
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age "3600";
            add_header Content-Length 0;
            return 204;
        }

        # 流式转发（禁用缓冲，sb3 文件可能较大）
        proxy_buffering off;
        proxy_cache off;
    }

    # SB3 presigned URL 端点（CORS 友好）
    location ~ ^/api/v1/project/(\d+)/sb3/presigned-url$ {
        proxy_pass http://backend/api/v1/project/$1/sb3/presigned-url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }
    }

    # 文件上传大小限制
    client_max_body_size 100M;

    # 错误页面
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
