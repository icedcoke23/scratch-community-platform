<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
    .loading-error {
      margin-top: 12px; font-size: 13px; color: #f38ba8;
      display: none; text-align: center; max-width: 400px;
    }
    .loading-error.show { display: block; }
    .retry-btn {
      margin-top: 12px; padding: 8px 24px;
      background: #3B82F6; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font-size: 14px;
      display: none;
    }
    .retry-btn.show { display: inline-block; }
    .retry-btn:hover { background: #2563EB; }
    .debug-log {
      position: fixed; bottom: 8px; left: 8px; right: 8px;
      max-height: 120px; overflow-y: auto;
      background: rgba(0,0,0,0.7); color: #a6e3a1;
      font-family: monospace; font-size: 11px;
      padding: 8px; border-radius: 8px;
      z-index: 10000; display: none;
    }
    .debug-log.show { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Scratch 编辑器加载中...</div>
    <div class="loading-error" id="loadingError"></div>
    <button class="retry-btn" id="retryBtn" onclick="location.reload()">重新加载</button>
  </div>
  <div id="scratch"></div>
  <div class="debug-log" id="debugLog"></div>

  <script>
    // ==================== 配置 ====================
    var params = new URLSearchParams(window.location.search);
    var projectUrl = params.get('project_url') || '';
    var mode = params.get('mode') || 'editor';
    var projectId = params.get('project_id') || '';
    var DEBUG = params.get('debug') === '1';

    // ==================== 状态追踪 ====================
    var vmReady = false;
    var projectLoaded = false;
    var projectLoadedSent = false;
    var loadAttempts = 0;
    var MAX_LOAD_ATTEMPTS = 10;

    // ==================== 调试日志 ====================
    function log(msg) {
      var ts = new Date().toISOString().substr(11, 12);
      var full = "[ScratchEditor " + ts + "] " + msg;
      console.log(full);
      if (DEBUG) {
        var el = document.getElementById('debugLog');
        if (el) {
          el.classList.add('show');
          el.textContent += full + "\n";
          el.scrollTop = el.scrollHeight;
        }
      }
    }

    // ==================== 安全发送消息给父窗口 ====================
    function postToParent(type, data) {
      try {
        if (window.parent && window.parent !== window) {
          var msg = Object.assign({ type: type }, data || {});
          window.parent.postMessage(msg, '*');
        }
      } catch (e) {
        log('postToParent 失败: ' + e.message);
      }
    }

    // ==================== UI 控制 ====================
    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    function showError(msg) {
      var el = document.getElementById('loadingError');
      var btn = document.getElementById('retryBtn');
      if (el) { el.textContent = msg; el.classList.add('show'); }
      if (btn) btn.classList.add('show');
      var spinner = document.querySelector('.spinner');
      if (spinner) spinner.style.display = 'none';
      var text = document.querySelector('.loading-text');
      if (text) text.textContent = '加载失败';
    }

    // ==================== Scratch 配置 - 完整原版配置 ====================
    window.scratchConfig = {
      session: {
        token: '',
        username: '',
      },
      backpack: {
        enable: false,
        api: "",
      },
      cloudData: {
        enable: false,
        id: "create",
        api: "",
      },
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: '',
        authorAvatar: './static/avatar.png',
      },
      logo: {
        show: false,
        url: '',
        handleClickLogo: function() {},
      },
      stageArea: {
        fullscreenButton: {
          show: true,
          handleBeforeSetStageUnFull: function() { return true; },
          handleBeforeSetStageFull: function() { return true; },
        },
        startButton: {
          show: true,
          handleBeforeStart: function() { return true; },
        },
        stopButton: {
          show: true,
          handleBeforeStop: function() { return true; },
        },
      },
      menuBar: {
        style: { background: 'hsla(215, 100%, 65%, 1)' },
        languageButton: {
          show: false,
          defaultLanguage: 'zh-cn',
        },
        newButton: {
          show: true,
          handleBefore: function() { return true; },
        },
        loadFileButton: {
          show: true,
          handleBefore: function() { return true; },
        },
        saveFileButton: {
          show: true,
          handleBefore: function() { return true; },
        },
        turboModeButton: {
          show: true,
        },
        helpButton: {
          show: true,
          handleBefore: function() { return true; },
        },
        myStuff: {
          show: false,
          url: '',
        },
        userAvatar: {
          show: false,
          username: '',
          avatar: '',
          handleClick: function() {},
        },
        customButtons: [],
      },
      blocks: {
        scale: 0.8,
        hideCatagorys: [],
        hideBlocks: [],
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        vmReady = true;
        log("VM 初始化完毕");

        try {
          vm.on('PROJECT_CHANGED', function() {
            postToParent('project-changed', {});
          });
          vm.on('PROJECT_START', function() {
            postToParent('project-start', {});
          });
          vm.on('PROJECT_STOP', function() {
            postToParent('project-stop', {});
          });
        } catch (e) {
          log('VM 事件绑定失败: ' + e.message);
        }

        postToParent('vm-initialized', {});

        if (projectUrl && !projectLoaded) {
          log('VM 就绪，开始加载项目...');
          safeLoadProject(projectUrl);
        }
      },
      handleProjectLoaded: function() {
        if (projectLoaded) return;
        projectLoaded = true;
        log('作品载入完毕');
        hideLoading();
        if (!projectLoadedSent) {
          projectLoadedSent = true;
          postToParent('project-loaded', {});
        }
      },
      handleDefaultProjectLoaded: function() {
        log('默认项目加载完成');
        scratchReady = true;

        if (!projectUrl) {
          projectLoaded = true;
          hideLoading();
          postToParent('project-loaded', { isDefault: true });
        }
      },
      defaultProjectURL: "./static/project.sb3",
      assets: {
        assetHost: './static',
        defaultIndex: {
          sprites: "./static/json_index/sprites.json",
          costumes: "./static/json_index/costumes.json",
          backdrops: "./static/json_index/backdrops.json",
          sounds: "./static/json_index/sounds.json",
        },
        handleBeforeSpriteLibraryOpen: function() { return true; },
        handleBeforeCostumesLibraryOpen: function() { return true; },
        handleBeforeBackdropsLibraryOpen: function() { return true; },
        handleBeforeSoundLibraryOpen: function() { return true; },
      },
    };

    // ==================== 播放器模式 ====================
    if (mode === 'player') {
      window.scratchConfig.menuBar.style = { display: 'none' };
      window.scratchConfig.menuBar.newButton.show = false;
      window.scratchConfig.menuBar.loadFileButton.show = false;
      window.scratchConfig.menuBar.saveFileButton.show = false;
      window.scratchConfig.menuBar.turboModeButton.show = false;
      window.scratchConfig.menuBar.helpButton.show = false;
      window.scratchConfig.stageArea.scale = Math.min(window.innerWidth / 480, window.innerHeight / 360);
    }

    // ==================== 项目加载 ====================
    /**
     * 加载项目 — 使用 window.scratch.loadProject（原生方式）
     *
     * 必须在 handleDefaultProjectLoaded 回调中调用，此时：
     * 1. React HOC 的 loadProject 事件监听器已注册（componentDidMount）
     * 2. 默认项目已加载完毕
     * 3. window.scratch.loadProject 已可用
     *
     * window.scratch.loadProject(url, callback) 内部：
     * → dispatches CustomEvent("loadProject")
     * → lib.min.js HOC catches → loadProjectByURL(url, callback)
     * → fetch url → FileReader → vm.loadProject(buffer)
     * → callback(err?) on completion
     */
    function loadProject(url) {
      loadAttempts++;
      log('加载项目 (attempt ' + loadAttempts + '): ' + url);

      if (!window.scratch || typeof window.scratch.loadProject !== 'function') {
        if (loadAttempts >= MAX_LOAD_ATTEMPTS) {
          log('window.scratch.loadProject 不可用，超过最大重试次数');
          showError('Scratch 编辑器初始化失败，请刷新页面重试');
          postToParent('error', { error: 'Scratch 初始化超时' });
          return;
        }
        log('window.scratch.loadProject 尚未就绪，500ms 后重试...');
        setTimeout(function() { loadProject(url); }, 500);
        return;
      }

      log('使用 window.scratch.loadProject（原生路径）');
      try {
        window.scratch.loadProject(url, function(err) {
          if (err) {
            log('项目加载回调错误: ' + err);
            showError('项目加载失败: ' + err);
            postToParent('error', { error: '项目加载失败: ' + err });
          } else {
            log('项目加载成功');
            onProjectReady();
          }
        });
      } catch (e) {
        log('window.scratch.loadProject 异常: ' + e.message);
        showError('项目加载异常: ' + e.message);
        postToParent('error', { error: e.message });
      }
    }

    /**
     * 项目加载成功后的通用处理
     */
    function onProjectReady() {
      if (projectLoaded) return;
      projectLoaded = true;
      hideLoading();
      if (!projectLoadedSent) {
        projectLoadedSent = true;
        postToParent('project-loaded', {});
      }
    }

    // ==================== Scratch 配置 ====================
    window.scratchConfig = {
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
      },
      logo: { show: false },
      menuBar: {
        style: { background: 'hsla(215, 100%, 65%, 1)' },
        languageButton: { show: true, defaultLanguage: 'zh-cn' },
        newButton: { show: true },
        loadFileButton: { show: true },
        saveFileButton: { show: true },
        turboModeButton: { show: true },
        helpButton: { show: true },
      },
      blocks: { scale: 1 },
      stageArea: {
        fullscreenButton: { show: true },
        startButton: { show: true },
        stopButton: { show: true },
      },

      // VM 初始化完成（lib.min.js 的 HOC 在 componentDidMount 中调用）
      // 此时仅保存 VM 引用，不加载项目（框架内部的 loadProject 监听器刚注册，但默认项目还未加载）
      handleVmInitialized: function(vm) {
        window.vm = vm;
        vmReady = true;
        log('VM 初始化完成');

        // 监听项目变更
        try {
          vm.on('PROJECT_CHANGED', function() {
            postToParent('project-changed', {});
          });
          vm.on('PROJECT_START', function() {
            postToParent('project-start', {});
          });
          vm.on('PROJECT_STOP', function() {
            postToParent('project-stop', {});
          });
        } catch (e) {
          log('VM 事件绑定失败: ' + e.message);
        }

        postToParent('vm-initialized', {});
      },

      // 项目加载完成（框架内部每次项目加载完成时调用，包括默认项目）
      handleProjectLoaded: function() {
        log('handleProjectLoaded 触发');
      },

      // 默认项目加载完成（仅首次调用，此时框架完全就绪）
      // 这是加载用户项目的正确时机 —— 与 teaching-open 一致
      handleDefaultProjectLoaded: function() {
        log('默认项目加载完成，框架就绪');

        if (projectUrl) {
          // 有项目 URL：加载用户项目
          log('开始加载用户项目: ' + projectUrl);
          loadProject(projectUrl);
        } else {
          // 无项目 URL：空白项目，直接就绪
          log('无项目 URL，使用默认空白项目');
          onProjectReady();
        }
      },
    };

    // ==================== 播放器模式 ====================
    if (mode === 'player') {
      window.scratchConfig.menuBar.newButton.show = false;
      window.scratchConfig.menuBar.loadFileButton.show = false;
      window.scratchConfig.menuBar.saveFileButton.show = false;
      window.scratchConfig.menuBar.turboModeButton.show = false;
      window.scratchConfig.menuBar.helpButton.show = false;
    }

    // ==================== 监听父窗口消息 ====================
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || !data.type) return;

      switch (data.type) {
        case 'load-project':
          if (data.url) {
            log('收到 load-project: ' + data.url);
            projectUrl = data.url;
            projectLoaded = false;
            projectLoadedSent = false;
            loadAttempts = 0;
            loadProject(data.url);
          }
          break;

        case 'exportProject':
          if (window.vm) {
            try {
              window.vm.saveProjectSb3().then(function(blob) {
                var reader = new FileReader();
                reader.onload = function() {
                  var base64 = reader.result.split(',')[1];
                  postToParent('project-save', { data: base64 });
                };
                reader.readAsDataURL(blob);
              }).catch(function(e) {
                log('导出失败: ' + e.message);
                postToParent('error', { error: '导出失败: ' + e.message });
              });
            } catch (e) {
              log('exportProject 异常: ' + e.message);
            }
          }
          break;

        case 'enter-editor':
          if (window.scratch && typeof window.scratch.setPlayerOnly === 'function') {
            try { window.scratch.setPlayerOnly(false); } catch(e) {}
          }
          break;

        case 'enter-player':
          if (window.scratch && typeof window.scratch.setPlayerOnly === 'function') {
            try { window.scratch.setPlayerOnly(true); } catch(e) {}
          }
          break;

        case 'set-fullscreen':
          if (window.scratch && typeof window.scratch.setFullScreen === 'function') {
            try { window.scratch.setFullScreen(!!data.fullscreen); } catch(e) {}
          } else if (data.fullscreen && document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
          } else if (!data.fullscreen && document.fullscreenElement) {
            document.exitFullscreen();
          }
          break;

        case 'set-project-name':
          if (data.name) document.title = data.name + ' - Scratch 编辑器';
          break;

        case 'get-project-name':
          postToParent('project-name', { name: document.title.replace(' - Scratch 编辑器', '') });
          break;

        case 'green-flag':
          if (window.vm) try { window.vm.greenFlag(); } catch(e) {}
          break;

        case 'stop-all':
          if (window.vm) try { window.vm.stopAll(); } catch(e) {}
          break;
      }
    });

    // ==================== 页面加载后处理 ====================
    window.addEventListener('load', function() {
      log('页面 load 事件');
      postToParent('editor-ready', { projectId: projectId });

      setTimeout(function() {
        if (!vmReady) {
          log('Scratch VM 初始化超时 (15s)');
          showError('Scratch 编辑器初始化超时，请检查网络连接后重试');
          postToParent('error', { error: 'Scratch VM 初始化超时' });
        }
      }, 15000);

      // 超时兜底：30 秒后如果项目仍未加载
      setTimeout(function() {
        if (!projectLoaded) {
          log('项目加载超时 (30s)，强制隐藏 loading');
          onProjectReady();
        }
      }, 30000);
    });
  </script>

  <script type="text/javascript" src="lib.min.js"></script>
  <script type="text/javascript" src="chunks/gui.js"></script>
</body>
</html>
