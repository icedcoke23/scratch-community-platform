<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Scratch 编辑器加载中...</div>
  </div>
  <div id="scratch"></div>

  <script>
    // 解析 URL 参数
    const params = new URLSearchParams(window.location.search);
    const projectUrl = params.get('project_url') || '';
    const mode = params.get('mode') || 'editor'; // 'editor' | 'player'
    const projectId = params.get('project_id') || '';

    // 向父窗口发送消息
    function postToParent(type, data) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type, ...data }, '*');
      }
    }

    // 隐藏加载动画
    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    // Scratch 配置
    window.scratchConfig = {
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
      },
      logo: { show: false },
      menuBar: {
        style: { background: 'hsla(215, 100%, 65%, 1)' },
        languageButton: { show: true, defaultLanguage: 'zh-cn' },
        newButton: { show: true },
        loadFileButton: { show: true },
        saveFileButton: { show: true },
        turboModeButton: { show: true },
        helpButton: { show: true },
      },
      blocks: { scale: 1 },
      stageArea: {
        fullscreenButton: { show: true },
        startButton: { show: true },
        stopButton: { show: true },
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        postToParent('vm-initialized', {});

        vm.on('PROJECT_CHANGED', function() {
          postToParent('project-changed', {});
        });
        vm.on('PROJECT_START', function() {
          postToParent('project-start', {});
        });
        vm.on('PROJECT_STOP', function() {
          postToParent('project-stop', {});
        });
      },
      handleProjectLoaded: function() {
        postToParent('project-loaded', {});
        hideLoading();
      },
      handleDefaultProjectLoaded: function() {
        postToParent('project-loaded', { isDefault: true });
        hideLoading();
      },
    };

    // 如果是播放器模式，隐藏编辑器 UI
    if (mode === 'player') {
      window.scratchConfig.menuBar.newButton.show = false;
      window.scratchConfig.menuBar.loadFileButton.show = false;
      window.scratchConfig.menuBar.saveFileButton.show = false;
      window.scratchConfig.menuBar.turboModeButton.show = false;
      window.scratchConfig.menuBar.helpButton.show = false;
    }

    // 监听来自父窗口的消息
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || !data.type) return;

      switch (data.type) {
        case 'load-project':
          if (data.url && window.scratch) {
            window.scratch.loadProject(data.url, function() {
              postToParent('project-loaded', { url: data.url });
            });
          }
          break;

        case 'exportProject':
          if (window.vm) {
            window.vm.saveProjectSb3().then(function(blob) {
              var reader = new FileReader();
              reader.onload = function() {
                var base64 = reader.result.split(',')[1];
                postToParent('project-save', { data: base64 });
              };
              reader.readAsDataURL(blob);
            });
          }
          break;

        case 'enter-editor':
          if (window.scratch) window.scratch.setPlayerOnly(false);
          break;

        case 'enter-player':
          if (window.scratch) window.scratch.setPlayerOnly(true);
          break;

        case 'set-fullscreen':
          if (window.scratch && data.fullscreen !== undefined) {
            window.scratch.setFullScreen(data.fullscreen);
          }
          break;

        case 'set-project-name':
          if (window.scratch && data.name) {
            window.scratch.setProjectName(data.name);
          }
          break;

        case 'get-project-name':
          if (window.scratch) {
            var name = window.scratch.getProjectName();
            postToParent('project-name', { name: name });
          }
          break;

        case 'green-flag':
          if (window.vm) window.vm.greenFlag();
          break;

        case 'stop-all':
          if (window.vm) window.vm.stopAll();
          break;
      }
    });

    // 加载完成后自动加载项目
    window.addEventListener('load', function() {
      if (projectUrl && window.scratch) {
        window.scratch.loadProject(projectUrl, function() {
          postToParent('project-loaded', { url: projectUrl });
          hideLoading();
        });
      }
    });

    // 通知父窗口编辑器已准备好
    postToParent('editor-ready', { projectId: projectId });
  </script>

  <!-- Scratch 核心库 (来自 teaching-open 预编译版本) -->
  <script src="./lib.min.js"></script>
  <script src="./chunks/gui.js"></script>
</body>
</html>
