<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">项目加载中...</div>
  </div>
  <div id="scratch"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const projectUrl = params.get('project_url') || '';

    function postToParent(type, data) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type, ...data }, '*');
      }
    }

    function hideLoading() {
      const el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    // 播放器配置
    window.scratchConfig = {
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
      },
      logo: { show: false },
      menuBar: {
        style: { display: 'none' },
        newButton: { show: false },
        loadFileButton: { show: false },
        saveFileButton: { show: false },
        turboModeButton: { show: false },
        helpButton: { show: false },
        languageButton: { show: false },
      },
      blocks: { scale: 1 },
      stageArea: {
        scale: window.innerWidth / 480,
        width: 480,
        height: 360,
        showControl: true,
        showLoading: false,
        fullscreenButton: { show: true },
        startButton: { show: true },
        stopButton: { show: true },
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        postToParent('vm-initialized', {});
        // 自动运行
        setTimeout(function() {
          vm.greenFlag();
        }, 500);
      },
      handleProjectLoaded: function() {
        postToParent('project-loaded', {});
        hideLoading();
      },
      handleDefaultProjectLoaded: function() {
        postToParent('project-loaded', { isDefault: true });
        hideLoading();
      },
    };

    // 监听父窗口消息
    window.addEventListener('message', function(event) {
      const data = event.data;
      if (!data || !data.type) return;

      switch (data.type) {
        case 'load-project':
          if (data.url && window.scratch) {
            window.scratch.loadProject(data.url, function() {
              postToParent('project-loaded', { url: data.url });
            });
          }
          break;
        case 'green-flag':
          if (window.vm) window.vm.greenFlag();
          break;
        case 'stop-all':
          if (window.vm) window.vm.stopAll();
          break;
      }
    });

    // 自动加载项目
    window.addEventListener('load', function() {
      if (projectUrl && window.scratch) {
        window.scratch.loadProject(projectUrl, function() {
          postToParent('project-loaded', { url: projectUrl });
          hideLoading();
        });
      } else {
        hideLoading();
      }
    });

    postToParent('player-ready', {});
  </script>

  <!-- Scratch 核心库 (来自 teaching-open 预编译版本) -->
  <script src="./lib.min.js"></script>
  <script src="./chunks/player.js"></script>
</body>
</html>
