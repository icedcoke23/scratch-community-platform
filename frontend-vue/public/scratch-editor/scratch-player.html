<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
    .loading-error {
      margin-top: 12px; font-size: 13px; color: #f38ba8;
      display: none; text-align: center; max-width: 400px;
    }
    .loading-error.show { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">项目加载中...</div>
    <div class="loading-error" id="loadingError"></div>
  </div>
  <div id="scratch"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var projectUrl = params.get('project_url') || '';
    var vmReady = false;
    var projectLoaded = false;

    function postToParent(type, data) {
      try {
        if (window.parent && window.parent !== window) {
          var msg = Object.assign({ type: type }, data || {});
          window.parent.postMessage(msg, '*');
        }
      } catch (e) {}
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    function showError(msg) {
      var el = document.getElementById('loadingError');
      if (el) { el.textContent = msg; el.classList.add('show'); }
      var spinner = document.querySelector('.spinner');
      if (spinner) spinner.style.display = 'none';
      var text = document.querySelector('.loading-text');
      if (text) text.textContent = '加载失败';
    }

    function safeLoadProject(url, callback) {
      // Scratch VM 没有 window.scratch.loadProject，需要 fetch + vm.loadProject
      if (!window.vm) {
        setTimeout(function() { safeLoadProject(url, callback); }, 500);
        return;
      }
      console.log('[ScratchPlayer] 开始加载项目:', url);
      fetch(url)
        .then(function(response) {
          if (!response.ok) throw new Error('下载项目失败: HTTP ' + response.status);
          return response.arrayBuffer();
        })
        .then(function(buffer) {
          console.log('[ScratchPlayer] sb3 下载完成，大小:', buffer.byteLength, 'bytes');
          return window.vm.loadProject(buffer);
        })
        .then(function() {
          console.log('[ScratchPlayer] 项目加载完成');
          if (callback) callback();
        })
        .catch(function(e) {
          console.error('[ScratchPlayer] loadProject 异常:', e);
          showError('项目加载失败: ' + e.message);
          postToParent('error', { error: e.message });
        });
    }

    // 播放器配置
    window.scratchConfig = {
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
      },
      logo: { show: false },
      menuBar: {
        style: { display: 'none' },
        newButton: { show: false },
        loadFileButton: { show: false },
        saveFileButton: { show: false },
        turboModeButton: { show: false },
        helpButton: { show: false },
        languageButton: { show: false },
      },
      blocks: { scale: 1 },
      stageArea: {
        scale: Math.min(window.innerWidth / 480, window.innerHeight / 360),
        width: 480,
        height: 360,
        showControl: true,
        showLoading: false,
        fullscreenButton: { show: true },
        startButton: { show: true },
        stopButton: { show: true },
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        vmReady = true;
        postToParent('vm-initialized', {});
        // 自动运行
        setTimeout(function() {
          try { vm.greenFlag(); } catch(e) {}
        }, 500);
      },
      handleProjectLoaded: function() {
        projectLoaded = true;
        postToParent('project-loaded', {});
        hideLoading();
      },
      handleDefaultProjectLoaded: function() {
        projectLoaded = true;
        postToParent('project-loaded', { isDefault: true });
        hideLoading();
      },
    };

    // 监听父窗口消息
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || !data.type) return;

      switch (data.type) {
        case 'load-project':
          if (data.url) {
            safeLoadProject(data.url, function() {
              postToParent('project-loaded', { url: data.url });
            });
          }
          break;
        case 'green-flag':
          if (window.vm) try { window.vm.greenFlag(); } catch(e) {}
          break;
        case 'stop-all':
          if (window.vm) try { window.vm.stopAll(); } catch(e) {}
          break;
      }
    });

    // 页面加载后
    window.addEventListener('load', function() {
      postToParent('player-ready', {});

      if (projectUrl) {
        safeLoadProject(projectUrl, function() {
          postToParent('project-loaded', { url: projectUrl });
          hideLoading();
        });
      }

      // 超时兜底
      setTimeout(function() {
        if (!vmReady) {
          showError('播放器初始化超时，请检查网络连接后重试');
          postToParent('error', { error: 'Scratch VM 初始化超时' });
        }
      }, 15000);

      setTimeout(function() {
        if (!projectLoaded) {
          hideLoading();
        }
      }, 20000);
    });
  </script>

  <script src="./lib.min.js"></script>
  <script src="./chunks/player.js"></script>
</body>
</html>
