<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
    .loading-error {
      margin-top: 12px; font-size: 13px; color: #f38ba8;
      display: none; text-align: center; max-width: 400px;
    }
    .loading-error.show { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">项目加载中...</div>
    <div class="loading-error" id="loadingError"></div>
  </div>
  <div id="scratch"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var projectUrl = params.get('project_url') || '';
    var vmReady = false;
    var projectLoaded = false;
    var projectLoadedSent = false;
    var loadAttempts = 0;
    var MAX_LOAD_ATTEMPTS = 10;

    function log(msg) { console.log('[ScratchPlayer] ' + msg); }

    function postToParent(type, data) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(Object.assign({ type: type }, data || {}), '*');
        }
      } catch (e) {}
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    function showError(msg) {
      var el = document.getElementById('loadingError');
      if (el) { el.textContent = msg; el.classList.add('show'); }
      var spinner = document.querySelector('.spinner');
      if (spinner) spinner.style.display = 'none';
      var text = document.querySelector('.loading-text');
      if (text) text.textContent = '加载失败';
    }

    // ==================== 项目加载成功后的通用处理 ====================
    function onProjectReady() {
      if (projectLoaded) return;
      projectLoaded = true;
      hideLoading();
      if (!projectLoadedSent) {
        projectLoadedSent = true;
        postToParent('project-loaded', {});
      }
    }

    // ==================== 完整播放器配置 ====================
    window.scratchConfig = {
      session: {
        token: '',
        username: '',
      },
      backpack: {
        enable: false,
        api: '',
      },
      cloudData: {
        enable: false,
        id: '',
        api: '',
      },
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
        authorAvatar: './static/avatar.png',
      },
      logo: {
        show: false,
        url: '',
        handleClickLogo: function() {},
      },
      menuBar: {
        style: { display: 'none' },
        newButton: { show: false },
        loadFileButton: { show: false },
        saveFileButton: { show: false },
        turboModeButton: { show: false },
        helpButton: { show: false },
        languageButton: { show: false, defaultLanguage: 'zh-cn' },
        myStuff: { show: false, url: '' },
        userAvatar: { show: false, username: '', avatar: '', handleClick: function() {} },
        customButtons: [],
      },
      blocks: {
        scale: 0.8,
        hideCatagorys: [],
        hideBlocks: [],
      },
      stageArea: {
        scale: Math.min(window.innerWidth / 480, window.innerHeight / 360),
        width: 480,
        height: 360,
        showControl: true,
        showLoading: false,
        fullscreenButton: {
          show: true,
          handleBeforeSetStageUnFull: function() {
            var event = new CustomEvent('scratchUnFullScreen');
            window.parent.document.dispatchEvent(event);
            return true;
          },
          handleBeforeSetStageFull: function() {
            var event = new CustomEvent('scratchFullScreen');
            window.parent.document.dispatchEvent(event);
            setTimeout(function() {
              window.scratch.setFullScreen(true);
            }, 100);
            return false;
          },
        },
        startButton: { show: true, handleBeforeStart: function() { return true; } },
        stopButton: { show: true, handleBeforeStop: function() { return true; } },
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        vmReady = true;
        log('VM 初始化完成');
        postToParent('vm-initialized', {});
      },
      handleProjectLoaded: function() {
        log('handleProjectLoaded 触发');
      },
      handleDefaultProjectLoaded: function() {
        log('默认项目加载完成，框架就绪');
        if (projectUrl) {
          // 有项目 URL：加载用户项目
          log('开始加载用户项目: ' + projectUrl);
          safeLoadProject(projectUrl);
        } else {
          // 无项目 URL：使用默认项目，直接就绪
          log('无项目 URL，使用默认项目');
          onProjectReady();
        }
      },
      defaultProjectURL: "./static/project.sb3",
      assets: {
        assetHost: './static',
        defaultIndex: {
          sprites: "./static/json_index/sprites.json",
          costumes: "./static/json_index/costumes.json",
          backdrops: "./static/json_index/backdrops.json",
          sounds: "./static/json_index/sounds.json",
        },
        handleBeforeSpriteLibraryOpen: function() { return true; },
        handleBeforeCostumesLibraryOpen: function() { return true; },
        handleBeforeBackdropsLibraryOpen: function() { return true; },
        handleBeforeSoundLibraryOpen: function() { return true; },
      },
    };

    function safeLoadProject(url, callback) {
      loadAttempts++;
      log('加载项目 (attempt ' + loadAttempts + '): ' + url);

      if (window.scratch && typeof window.scratch.loadProject === 'function') {
        log('使用 window.scratch.loadProject（原生路径）');
        try {
          window.scratch.loadProject(url, function(err) {
            if (err) {
              log('原生路径错误: ' + err);
              loadProjectFallback(url, callback);
            } else {
              log('项目加载成功（原生路径）');
              if (callback) callback();
              onProjectReady();
              // 自动运行项目（与 teaching-open player 一致）
              if (window.vm) {
                try { window.vm.greenFlag(); } catch(e) {}
              }
            }
          });
        } catch (e) {
          log('原生路径异常: ' + e.message);
          loadProjectFallback(url, callback);
        }
        return;
      }

      if (window.vm && typeof window.vm.loadProject === 'function') {
        log('使用 vm.loadProject（兜底路径）');
        loadProjectFallback(url, callback);
        return;
      }

      if (loadAttempts >= MAX_LOAD_ATTEMPTS) {
        log('超过最大重试次数');
        showError('播放器初始化失败，请刷新重试');
        postToParent('error', { error: '播放器初始化超时' });
        return;
      }
      log('window.scratch 和 window.vm 都未就绪，500ms 后重试...');
      setTimeout(function() { safeLoadProject(url, callback); }, 500);
    }

    function loadProjectFallback(url, callback) {
      log('fetch sb3: ' + url);
      fetch(url)
        .then(function(response) {
          if (!response.ok) throw new Error('HTTP ' + response.status);
          return response.arrayBuffer();
        })
        .then(function(buffer) {
          log('sb3 下载完成: ' + buffer.byteLength + ' bytes, 调用 vm.loadProject...');
          return window.vm.loadProject(buffer);
        })
        .then(function() {
          log('项目加载成功（兜底路径）');
          if (callback) callback();
          onProjectReady();
          // 自动运行项目
          if (window.vm) {
            try { window.vm.greenFlag(); } catch(e) {}
          }
        })
        .catch(function(e) {
          log('项目加载失败: ' + e.message);
          showError('项目加载失败: ' + e.message);
          postToParent('error', { error: e.message });
        });
    }

    // ==================== 监听父窗口消息 ====================
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || !data.type) return;
      switch (data.type) {
        case 'load-project':
          if (data.url) {
            projectUrl = data.url;
            projectLoaded = false;
            projectLoadedSent = false;
            loadAttempts = 0;
            safeLoadProject(data.url);
          }
          break;
        case 'green-flag':
          if (window.vm) try { window.vm.greenFlag(); } catch(e) {}
          break;
        case 'stop-all':
          if (window.vm) try { window.vm.stopAll(); } catch(e) {}
          break;
      }
    });

    window.addEventListener('load', function() {
      log('页面 load 事件');
      postToParent('player-ready', {});

      setTimeout(function() {
        if (!vmReady) {
          log('VM 初始化超时 (15s)');
          showError('播放器初始化超时，请检查网络连接后重试');
          postToParent('error', { error: 'Scratch VM 初始化超时' });
        }
      }, 15000);

      setTimeout(function() {
        if (!projectLoaded) {
          log('项目加载超时 (30s)');
          onProjectReady();
        }
      }, 30000);
    });
  </script>

  <script type="text/javascript" src="lib.min.js"></script>
  <script type="text/javascript" src="chunks/player.js"></script>
</body>
</html>
