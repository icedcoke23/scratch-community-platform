<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratch 播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    #scratch { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1e1e2e; color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; font-size: 14px; opacity: 0.8; }
    .loading-error {
      margin-top: 12px; font-size: 13px; color: #f38ba8;
      display: none; text-align: center; max-width: 400px;
    }
    .loading-error.show { display: block; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">项目加载中...</div>
    <div class="loading-error" id="loadingError"></div>
  </div>
  <div id="scratch"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var projectUrl = params.get('project_url') || '';
    var vmReady = false;
    var projectLoaded = false;
    var loadAttempts = 0;
    var MAX_LOAD_ATTEMPTS = 10;

    function log(msg) { console.log('[ScratchPlayer] ' + msg); }

    function postToParent(type, data) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(Object.assign({ type: type }, data || {}), '*');
        }
      } catch (e) {}
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }

    function showError(msg) {
      var el = document.getElementById('loadingError');
      if (el) { el.textContent = msg; el.classList.add('show'); }
      var spinner = document.querySelector('.spinner');
      if (spinner) spinner.style.display = 'none';
      var text = document.querySelector('.loading-text');
      if (text) text.textContent = '加载失败';
    }

    /**
     * 加载项目 — 双路径策略
     * 路径 A: window.scratch.loadProject(url, callback) — 原生方式
     * 路径 B: fetch → vm.loadProject(buffer) — 兜底方式
     */
    function safeLoadProject(url, callback) {
      loadAttempts++;
      log('加载项目 (attempt ' + loadAttempts + '): ' + url);

      // 路径 A：window.scratch.loadProject
      if (window.scratch && typeof window.scratch.loadProject === 'function') {
        log('使用 window.scratch.loadProject');
        try {
          window.scratch.loadProject(url, function(err) {
            if (err) {
              log('原生路径错误: ' + err);
              loadProjectFallback(url, callback);
            } else {
              log('项目加载成功（原生路径）');
              if (callback) callback();
            }
          });
        } catch (e) {
          log('原生路径异常: ' + e.message);
          loadProjectFallback(url, callback);
        }
        return;
      }

      // 路径 B：vm.loadProject
      if (window.vm && typeof window.vm.loadProject === 'function') {
        log('使用 vm.loadProject（兜底）');
        loadProjectFallback(url, callback);
        return;
      }

      // 都不可用，重试
      if (loadAttempts >= MAX_LOAD_ATTEMPTS) {
        log('超过最大重试次数');
        showError('播放器初始化失败，请刷新重试');
        postToParent('error', { error: '播放器初始化超时' });
        return;
      }
      setTimeout(function() { safeLoadProject(url, callback); }, 500);
    }

    function loadProjectFallback(url, callback) {
      log('fetch sb3: ' + url);
      fetch(url)
        .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
        .then(function(buf) {
          log('sb3 下载完成: ' + buf.byteLength + ' bytes');
          return window.vm.loadProject(buf);
        })
        .then(function() {
          log('项目加载成功（兜底路径）');
          projectLoaded = true;
          hideLoading();
          postToParent('project-loaded', { url: url });
          if (callback) callback();
        })
        .catch(function(e) {
          log('加载失败: ' + e.message);
          showError('项目加载失败: ' + e.message);
          postToParent('error', { error: e.message });
        });
    }

    // 播放器配置
    window.scratchConfig = {
      projectInfo: {
        projectName: params.get('project_name') || '',
        authorUsername: params.get('author') || '',
      },
      logo: { show: false },
      menuBar: {
        style: { display: 'none' },
        newButton: { show: false },
        loadFileButton: { show: false },
        saveFileButton: { show: false },
        turboModeButton: { show: false },
        helpButton: { show: false },
        languageButton: { show: false },
      },
      blocks: { scale: 1 },
      stageArea: {
        scale: Math.min(window.innerWidth / 480, window.innerHeight / 360),
        width: 480,
        height: 360,
        showControl: true,
        showLoading: false,
        fullscreenButton: { show: true },
        startButton: { show: true },
        stopButton: { show: true },
      },
      handleVmInitialized: function(vm) {
        window.vm = vm;
        vmReady = true;
        log('VM 初始化完成');
        postToParent('vm-initialized', {});

        // 自动运行
        setTimeout(function() {
          try { vm.greenFlag(); } catch(e) {}
        }, 500);

        // 如果有 projectUrl，开始加载
        if (projectUrl && !projectLoaded) {
          log('VM 就绪，开始加载项目...');
          safeLoadProject(projectUrl);
        }
      },
      handleProjectLoaded: function() {
        if (projectLoaded) return;
        projectLoaded = true;
        log('项目加载完成');
        hideLoading();
        postToParent('project-loaded', {});
      },
      handleDefaultProjectLoaded: function() {
        log('默认项目加载完成');
        if (!projectUrl) {
          projectLoaded = true;
          hideLoading();
          postToParent('project-loaded', { isDefault: true });
        }
      },
    };

    // 监听父窗口消息
    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || !data.type) return;
      switch (data.type) {
        case 'load-project':
          if (data.url) {
            projectUrl = data.url;
            loadAttempts = 0;
            safeLoadProject(data.url);
          }
          break;
        case 'green-flag':
          if (window.vm) try { window.vm.greenFlag(); } catch(e) {}
          break;
        case 'stop-all':
          if (window.vm) try { window.vm.stopAll(); } catch(e) {}
          break;
      }
    });

    // 页面加载
    window.addEventListener('load', function() {
      log('页面 load 事件');
      postToParent('player-ready', {});

      // 超时兜底
      setTimeout(function() {
        if (!vmReady) {
          log('VM 初始化超时 (15s)');
          showError('播放器初始化超时，请检查网络连接后重试');
          postToParent('error', { error: 'Scratch VM 初始化超时' });
        }
      }, 15000);

      setTimeout(function() {
        if (!projectLoaded) {
          log('项目加载超时 (20s)');
          hideLoading();
          postToParent('project-loaded', { timeout: true });
        }
      }, 20000);
    });
  </script>

  <script src="./lib.min.js"></script>
  <script src="./chunks/player.js"></script>
</body>
</html>
